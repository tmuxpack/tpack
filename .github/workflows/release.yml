name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_TOKEN: ${{ secrets.GORELEASER_TOKEN }}

      - name: Fix Termux deb architecture
        run: |
          for deb in dist/*termux*arm64*.deb; do
            [ -f "$deb" ] || continue
            tmpdir=$(mktemp -d)
            dpkg-deb -R "$deb" "$tmpdir"
            sed -i 's/^Architecture: arm64$/Architecture: aarch64/' "$tmpdir/DEBIAN/control"
            dpkg-deb -b "$tmpdir" "$deb"
            rm -rf "$tmpdir"
          done

      - name: Update checksums and upload fixed Termux debs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Regenerate checksums for modified debs
          for deb in dist/*termux*arm64*.deb; do
            [ -f "$deb" ] || continue
            filename=$(basename "$deb")
            sha=$(sha256sum "$deb" | awk '{print $1}')
            sed -i "s/^[a-f0-9]\{64\}  ${filename}$/${sha}  ${filename}/" dist/checksums.txt
          done
          gh release upload "${GITHUB_REF_NAME}" dist/checksums.txt --clobber
          for deb in dist/*termux*.deb; do
            [ -f "$deb" ] || continue
            gh release upload "${GITHUB_REF_NAME}" "$deb" --clobber
          done

  aur-publish:
    needs: release
    runs-on: [self-hosted, aur-publisher]
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release checksums
        run: |
          curl -fsSL "https://github.com/tmuxpack/tpack/releases/download/${GITHUB_REF_NAME}/checksums.txt" -o checksums.txt

      - name: Prepare PKGBUILD and .SRCINFO
        run: |
          set -euo pipefail
          rm -rf build aur-repo
          AMD64_SHA=$(grep "tpack_${{ steps.version.outputs.version }}_linux_amd64.tar.gz" checksums.txt | awk '{print $1}')
          ARM64_SHA=$(grep "tpack_${{ steps.version.outputs.version }}_linux_arm64.tar.gz" checksums.txt | awk '{print $1}')

          if [[ -z "$AMD64_SHA" ]]; then
            echo "error: AMD64 SHA not found in checksums.txt" >&2
            exit 1
          fi
          if [[ -z "$ARM64_SHA" ]]; then
            echo "error: ARM64 SHA not found in checksums.txt" >&2
            exit 1
          fi

          mkdir -p build
          sed -e "s/PKGVER_PLACEHOLDER/${{ steps.version.outputs.version }}/" \
              -e "s/SHA256SUM_AMD64_PLACEHOLDER/${AMD64_SHA}/" \
              -e "s/SHA256SUM_ARM64_PLACEHOLDER/${ARM64_SHA}/" \
              aur/PKGBUILD > build/PKGBUILD

          cd build
          makepkg --printsrcinfo > .SRCINFO

      - name: Push to AUR
        env:
          GIT_SSH_COMMAND: "ssh -i /home/runner/.ssh/aur -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null"
        run: |
          git clone ssh://aur@aur.archlinux.org/tpack-bin.git aur-repo
          cp build/PKGBUILD build/.SRCINFO aur-repo/
          cd aur-repo
          git -c user.name=tmuxpack \
              -c user.email=tmuxpack@users.noreply.github.com \
              add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to push."
            exit 0
          fi
          git -c user.name=tmuxpack \
              -c user.email=tmuxpack@users.noreply.github.com \
              commit -m "Update to ${{ steps.version.outputs.version }}"
          git push
